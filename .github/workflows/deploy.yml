name: Deploy to AWS Lambda (Always Free Tier)

# GitHub Free Tier:
#   - Public repo  → Unlimited Actions minutes (FREE forever) ✅
#   - Private repo → 2,000 minutes/month free
# This repo is PUBLIC so minutes are unlimited.
# We still optimize to keep each run fast (~3-4 min target).

on:
  push:
    branches:
      - main
    # Only trigger when relevant files change — skip docs/readme-only commits
    paths-ignore:
      - '**.md'
      - '.cursorrules'
      - '.editorconfig'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest   # Linux = 1x minute multiplier (cheapest runner)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath
          # Cache PHP extensions to speed up setup
          coverage: none
          tools: composer:v2

      # Cache composer vendor directory — saves ~60s on every run
      - name: Cache Composer Dependencies
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer Dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --prefer-dist --no-dev --optimize-autoloader --no-interaction

      # When cache hits, still run autoload dump to ensure class maps are fresh
      - name: Optimize Autoloader (cache hit)
        if: steps.composer-cache.outputs.cache-hit == 'true'
        run: composer dump-autoload --optimize --no-dev --no-interaction

      # Cache serverless + node_modules to save ~30s
      - name: Cache Serverless node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: serverless-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: serverless-npm-

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Serverless Deploy
        run: serverless deploy --stage production
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          MCP_TOKEN: ${{ secrets.MCP_TOKEN }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
