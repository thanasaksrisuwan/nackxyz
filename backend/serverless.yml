service: dev-persona-backend

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  architecture: arm64
  environment:
    DYNAMODB_TABLE: dev-persona-stats
    SOUL_DRINK_TABLE: souldrink-stats
    AUDIT_VERDICTS_TABLE: audit-verdicts
    AUDIT_VERDICT_TTL_DAYS: '30'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource:
            - Fn::GetAtt: [ StatsTable, Arn ]
            - Fn::GetAtt: [ SoulDrinkStatsTable, Arn ]
            - Fn::GetAtt: [ AuditVerdictsTable, Arn ]

plugins:
  - serverless-esbuild

functions:
  api:
    handler: src/index.handler
    url: true
    events:
      - httpApi: '*'

resources:
  Resources:
    StatsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: dev-persona-stats
        AttributeDefinitions:
          - AttributeName: archetypeId
            AttributeType: S
        KeySchema:
          - AttributeName: archetypeId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    SoulDrinkStatsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: souldrink-stats
        AttributeDefinitions:
          - AttributeName: result_id
            AttributeType: S
        KeySchema:
          - AttributeName: result_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    AuditVerdictsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: audit-verdicts
        AttributeDefinitions:
          - AttributeName: verdict_id
            AttributeType: S
        KeySchema:
          - AttributeName: verdict_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TimeToLiveSpecification:
          AttributeName: ttl_expires_at
          Enabled: true

    HttpApiStage:
      Type: AWS::ApiGatewayV2::Stage
      Properties:
        ApiId: { Ref: HttpApi }
        StageName: $default
        RouteSettings:
          "$default":
            ThrottlingBurstLimit: 100
            ThrottlingRateLimit: 50

