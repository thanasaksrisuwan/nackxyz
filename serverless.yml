service: laravel-mcp-lab

provider:
    name: aws
    region: ap-southeast-1
    stage: dev

    # --- FREE TIER: Lambda ---
    # Free: 1M requests/month + 400,000 GB-seconds/month
    # Our usage: ~44,000 invocations/month (cron) + dashboard visits << 1M
    # Memory at 128MB minimizes GB-second consumption
    memorySize: 128

    # --- FREE TIER: CloudWatch Logs ---
    # Free: 5GB ingestion/month. Retention prevents unbounded log storage costs.
    logRetentionInDays: 7

    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - dynamodb:Query
                      - dynamodb:Scan
                      - dynamodb:GetItem
                      - dynamodb:PutItem
                      - dynamodb:UpdateItem
                      - dynamodb:DeleteItem
                  Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:custom.tableName}"
    environment:
        APP_ENV: production
        APP_DEBUG: 'false'
        APP_KEY: ${env:APP_KEY}
        MCP_TOKEN: ${env:MCP_TOKEN, 'mcp-secret-lab-token'}
        DYNAMODB_TABLE: ${self:custom.tableName}
        BINANCE_API_KEY: ${env:BINANCE_API_KEY, ''}
        BINANCE_API_SECRET: ${env:BINANCE_API_SECRET, ''}
        TELEGRAM_BOT_TOKEN: ${env:TELEGRAM_BOT_TOKEN, ''}
        TELEGRAM_CHAT_ID: ${env:TELEGRAM_CHAT_ID, ''}
        ADMIN_USERNAME: ${env:ADMIN_USERNAME, 'admin'}
        ADMIN_PASSWORD: ${env:ADMIN_PASSWORD, 'admin123'}
        LOG_CHANNEL: stderr
        CACHE_STORE: array
        SESSION_DRIVER: cookie
        QUEUE_CONNECTION: sync

package:
    patterns:
        - '!node_modules/**'
        - '!public/build/**'
        - '!public/storage'
        - '!resources/assets/**'
        - '!resources/css/**'
        - '!resources/js/**'
        - '!storage/**'
        - '!tests/**'
        - '!.github/**'
        - '!*.md'
        - '!package.json'
        - '!package-lock.json'
        - '!tailwind.config.js'
        - '!vite.config.js'
        - '!postcss.config.js'
        # Explicitly keep compiled CSS (inlined in blade via file_get_contents)
        - 'public/css/**'

functions:
    # Web dashboard function
    web:
        handler: public/index.php
        runtime: php-83-fpm
        timeout: 28
        events:
            - httpApi: '*'

    # Trade bot cron — runs every 5 minutes to reduce Lambda invocations
    # FREE TIER: 1 minute = 43,200 invocations/month
    #            5 minutes = 8,640 invocations/month (72x fewer, safer buffer)
    artisan:
        handler: artisan
        runtime: php-83-console
        timeout: 120
        events:
            - schedule:
                rate: rate(5 minutes)
                input: '"trade:run"'

custom:
    tableName: ${self:service}-trades-${sls:stage}

resources:
    Resources:
        TradesTable:
            Type: AWS::DynamoDB::Table
            Properties:
                TableName: ${self:custom.tableName}
                AttributeDefinitions:
                    - AttributeName: id
                      AttributeType: S
                KeySchema:
                    - AttributeName: id
                      KeyType: HASH
                # --- FREE TIER: DynamoDB ---
                # PAY_PER_REQUEST does NOT use the free 25 WCU/25 RCU allowance.
                # PROVISIONED with 1 WCU + 1 RCU stays well within the free 25 each.
                BillingMode: PROVISIONED
                ProvisionedThroughput:
                    ReadCapacityUnits: 1
                    WriteCapacityUnits: 1

        # Set CloudWatch log group retention for Lambda functions
        WebLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: /aws/lambda/${self:service}-production-web
                RetentionInDays: 7

        ArtisanLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: /aws/lambda/${self:service}-production-artisan
                RetentionInDays: 7

plugins:
    - ./vendor/bref/bref
