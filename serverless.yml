service: laravel-mcp-lab

provider:
    name: aws
    region: ap-southeast-1
    stage: dev
    runtime: nodejs20.x

    # --- FREE TIER: Lambda ---
    # Memory at 512MB provides a good balance between execution speed and cost.
    # Keep log retention in days to protect CloudWatch logs free limit.
    memorySize: 512
    logRetentionInDays: 7

    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - dynamodb:Query
                      - dynamodb:Scan
                      - dynamodb:GetItem
                      - dynamodb:PutItem
                      - dynamodb:UpdateItem
                      - dynamodb:DeleteItem
                  Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:custom.tableName}"
    environment:
        APP_ENV: production
        DYNAMODB_TABLE: ${self:custom.tableName}
        BINANCE_API_KEY: ${env:BINANCE_API_KEY, ''}
        BINANCE_API_SECRET: ${env:BINANCE_API_SECRET, ''}
        TELEGRAM_BOT_TOKEN: ${env:TELEGRAM_BOT_TOKEN, ''}
        TELEGRAM_CHAT_ID: ${env:TELEGRAM_CHAT_ID, ''}
        ADMIN_USERNAME: ${env:ADMIN_USERNAME, 'admin'}
        ADMIN_PASSWORD: ${env:ADMIN_PASSWORD, 'admin123'}
        MCP_TOKEN: ${env:MCP_TOKEN, 'mcp-secret-lab-token'}

package:
    individually: true
    patterns:
        - '!**'
        - '.next/standalone/**'
        - '.next/standalone/.next/**'

functions:
    # Next.js Web Dashboard & Cron Runner
    web:
        handler: .next/standalone/lambda.handler
        timeout: 29
        events:
            - httpApi: '*'
            # Scheduled trade bot cron trigger (runs every 5 minutes to protect AWS free tier limit)
            - schedule:
                rate: rate(5 minutes)
                enabled: true

custom:
    tableName: ${self:service}-trades-${sls:stage}

resources:
    Resources:
        TradesTable:
            Type: AWS::DynamoDB::Table
            Properties:
                TableName: ${self:custom.tableName}
                AttributeDefinitions:
                    - AttributeName: id
                      AttributeType: S
                KeySchema:
                    - AttributeName: id
                      KeyType: HASH
                # --- FREE TIER: DynamoDB ---
                BillingMode: PROVISIONED
                ProvisionedThroughput:
                    ReadCapacityUnits: 1
                    WriteCapacityUnits: 1

        # CloudWatch log group retention limit
        WebLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: /aws/lambda/${self:service}-production-web
                RetentionInDays: 7
